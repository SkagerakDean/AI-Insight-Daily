name: Sync Markdown to Feishu

on:
  push:
    branches: ["main"]
    paths:
      - "content/cn/**"
      - "scripts/sync_to_feishu.py"
      - ".github/workflows/sync-feishu.yml"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - all
      kind:
        description: "Content kind"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - daily
          - weekly
      since:
        description: "Only sync content on or after this date (YYYY-MM-DD)"
        required: false
        default: ""
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install requests pyyaml

      - name: Sync To Feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_DAILY_FOLDER_TOKEN: ${{ secrets.FEISHU_DAILY_FOLDER_TOKEN }}
          FEISHU_WEEKLY_FOLDER_TOKEN: ${{ secrets.FEISHU_WEEKLY_FOLDER_TOKEN }}
          FEISHU_NOTIFY_RECEIVE_IDS: ${{ secrets.FEISHU_NOTIFY_RECEIVE_IDS }}
          FEISHU_NOTIFY_ID_TYPE: ${{ secrets.FEISHU_NOTIFY_ID_TYPE }}
        run: |
          python3 scripts/sync_to_feishu.py \
            --mode "${{ github.event.inputs.mode || 'latest' }}" \
            --kind "${{ github.event.inputs.kind || 'all' }}" \
            ${{ github.event.inputs.since && format('--since "{0}"', github.event.inputs.since) || '' }}
